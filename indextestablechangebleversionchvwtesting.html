<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unicode Phonetic Typer</title>

<style>
    @font-face {
            font-family: font;
            src: url('font.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
body{
    margin:0;
    font-family:font;
    background:linear-gradient(135deg,#e6ecf5,#d4e0f5);
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:900px;
    padding:20px;
}

h2{
    text-align:center;
}

textarea{
    width:100%;
    padding:12px;
    font-size:18px;
    border-radius:8px;
    border:2px solid #ccc;
    resize:vertical;
    box-sizing:border-box;
}

#output{
    margin-top:15px;
    padding:15px;
    min-height:150px;
    border-radius:10px;
    border:2px solid #3498db;
    background:white;
    font-size:28px;
    white-space:pre-wrap;
    word-break:break-word;
    font-family: font;
}

.controls{
    margin-top:15px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

button{
    padding:8px;
    border:none;
    border-radius:6px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

#mobileKeyboard{
    display:none;
    margin-top:20px;
    grid-template-columns:repeat(6,1fr);
    gap:5px;
}

.key{
    padding:10px;
    background:#eee;
    border-radius:6px;
    text-align:center;
    cursor:pointer;
}

.key:active{
    background:#ccc;
}

@media (pointer:coarse){
    #mobileKeyboard{
        display:grid;
    }
}
</style>
</head>
<body>

<div class="container">

<h2>Unicode Phonetic Typer</h2>

<textarea id="input" placeholder="Type phonetics..."></textarea>

<div id="output"></div>

<div class="controls">
<button onclick="copyOutput()">Copy</button>
<button onclick="toggleMode()">Switch Mode</button>

<label>Letter Space
<input type="range" min="0" max="20" value="0"
oninput="output.style.letterSpacing=this.value+'px'">
</label>

<label>Line Space
<input type="range" min="1" max="3" step="0.1" value="1.2"
oninput="output.style.lineHeight=this.value">
</label>

<label>Color
<input type="color"
oninput="output.style.color=this.value">
</label>
</div>

<label>Font Size
<input type="range" min="20" max="1000" value="32"
oninput="changeFontSize(this.value)">
</label>

<label>Display Zoom
<input type="range" min="0.5" max="2" step="0.1" value="1"
oninput="changeDisplaySize(this.value)">
</label>

<div id="mobileKeyboard">
<div class="key" onclick="insertSeparator()">Separator</div>
</div>

</div>

// ======================================
// TRIE ENGINE (FAST LONGEST MATCH)
// ======================================

class TrieNode {
    constructor(){
        this.children = {};
        this.value = null;
    }
}

function buildTrie(map){
    const root = new TrieNode();

    for(let key in map){

        let node = root;

        for(let char of key){
            if(!node.children[char]){
                node.children[char] = new TrieNode();
            }
            node = node.children[char];
        }

        node.value = map[key];
    }

    return root;
}

const trie = buildTrie(charMap);



// ======================================
// PHONETIC → UNICODE
// ======================================

function translatePhonetic(text){

    let result = "";
    let i = 0;

    while(i < text.length){

        // Separator ("/" key)
        if(text[i] === "/"){
            result += CHAR_SEPARATOR;
            i++;
            continue;
        }

        // Positional vowels
        if(positionalVowels[text[i]]){

            let isStart =
                i === 0 ||
                text[i-1] === CHAR_SEPARATOR ||
                !/[a-zA-Z]/.test(text[i-1]);

            const vowel = positionalVowels[text[i]];

            result += isStart ? vowel.init : vowel.medi;
            i++;
            continue;
        }

        // Trie matching
        let node = trie;
        let j = i;
        let lastMatch = null;
        let lastIndex = i;

        while(j < text.length && node.children[text[j]]){
            node = node.children[text[j]];
            if(node.value){
                lastMatch = node.value;
                lastIndex = j + 1;
            }
            j++;
        }

        if(lastMatch){
            result += lastMatch;
            i = lastIndex;
        } else {
            result += text[i];
            i++;
        }
    }

    return result;
}



// ======================================
// UNICODE → PHONETIC
// ======================================

const reverseMap = {};
for(let key in charMap){
    reverseMap[charMap[key]] = key;
}

function translateUnicode(text){

    let result = "";

    for(let char of text){

        if(char === CHAR_SEPARATOR){
            continue; // invisible
        }

        if(reverseMap[char]){
            result += reverseMap[char];
        }
        else if(char === positionalVowels.i.init ||
                char === positionalVowels.i.medi){
            result += "i";
        }
        else if(char === positionalVowels.o.init ||
                char === positionalVowels.o.medi){
            result += "o";
        }
        else if(char === positionalVowels.u.init ||
                char === positionalVowels.u.medi){
            result += "u";
        }
        else{
            result += char;
        }
    }

    return result;
}



// ======================================
// UI CONTROLS
// ======================================

let mode = "phonetic";

const input = document.getElementById("input");
const output = document.getElementById("output");

input.addEventListener("input", updateOutput);

function updateOutput(){

    let result =
        mode === "phonetic"
        ? translatePhonetic(input.value)
        : translateUnicode(input.value);

    // hide separator visually
    output.innerText = result.replaceAll(CHAR_SEPARATOR,"");
}

function toggleMode(){
    mode = mode === "phonetic" ? "unicode" : "phonetic";
    updateOutput();
}

function copyOutput(){
    navigator.clipboard.writeText(output.innerText);
}

function insertSeparator(){
    input.value += "/";
    updateOutput();
}

// REAL FONT SIZE (no transform scaling)
function setFontSize(value){
    output.style.fontSize = value + "px";
}

// Fullscreen mode
function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}
